<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bet777</title>
    <link rel="stylesheet" href="./assets/css/pagInicial.css">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>

<body>

 <header>
        <div class="logo-header">
            <a href="./index.html">
            <img src="./assets/img/bet777.png" alt="bet777">

        </div>
    </header>

    <main>
        <section class="login">

            <h2>Login</h2>

        </section>
    </main>

</body>

</html>
